<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Space Grotesk','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="70%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0b12"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative network, right side -->
  <g stroke="#6366f1" stroke-opacity="0.35" stroke-width="1.4">
    <line x1="980" y1="120" x2="1080" y2="200"/>
    <line x1="1080" y1="200" x2="1010" y2="320"/>
    <line x1="1010" y1="320" x2="920" y2="260"/>
    <line x1="920" y1="260" x2="980" y2="120"/>
    <line x1="1010" y1="320" x2="1120" y2="400"/>
    <line x1="920" y1="260" x2="860" y2="410"/>
    <line x1="1120" y1="400" x2="1040" y2="500"/>
    <line x1="860" y1="410" x2="1040" y2="500"/>
  </g>
  <g fill="url(#grad)">
    <circle cx="980" cy="120" r="8"/>
    <circle cx="1080" cy="200" r="6"/>
    <circle cx="920" cy="260" r="7"/>
    <circle cx="1010" cy="320" r="10"/>
    <circle cx="1120" cy="400" r="6"/>
    <circle cx="860" cy="410" r="7"/>
    <circle cx="1040" cy="500" r="9"/>
  </g>

  <!-- brand mark -->
  <rect x="90" y="96" width="34" height="34" rx="10" fill="url(#grad)"/>
  <rect x="99" y="105" width="16" height="16" rx="4" fill="#0a0b12" opacity="0.55"/>
  <text x="140" y="121" fill="#e8eaf2" font-size="26" font-weight="700" letter-spacing="-0.5">Hajian</text>

  <text x="90" y="250" fill="#34d8ee" font-size="22" font-weight="500" letter-spacing="3" font-family="'JetBrains Mono',monospace">DR. MOJTABA HAJIAN</text>

  <text x="86" y="345" font-size="76" font-weight="700" letter-spacing="-2" fill="url(#grad)">AI &amp; ML systems,</text>
  <text x="90" y="425" font-size="76" font-weight="700" letter-spacing="-2" fill="#e8eaf2">applied to real problems.</text>

  <text x="90" y="500" fill="#a6acc2" font-size="27" font-weight="400" font-family="'Inter','Segoe UI',sans-serif">Deep learning · Scalable big-data analytics · Medical AI · Neuroscience</text>

  <rect x="90" y="545" width="1020" height="1.5" fill="#ffffff" opacity="0.1"/>
  <text x="90" y="585" fill="#767d95" font-size="21" font-family="'JetBrains Mono',monospace">PhD · ICT   |   Free University of Bozen-Bolzano   |   Bolzano, Italy</text>
